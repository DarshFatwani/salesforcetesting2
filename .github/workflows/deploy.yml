name: Deploy to Salesforce & Trigger Kamikaze

on:
push:
branches:
- main
- test2
- test4
- test6
- test7
- test8
- KAN-9
paths-ignore:
- '.github/**'

jobs:
deploy-and-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Install Salesforce CLI
    run: npm install --global @salesforce/cli

  - name: Authenticate to Salesforce
    run: |
      echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
      sf org login sfdx-url --sfdx-url-file auth_url.txt --alias staging-org --set-default
      rm auth_url.txt

  - name: Verify Org Connection
    run: sf org display --target-org staging-org

  - name: Deploy Source to Salesforce
    run: |
      sf project deploy start \
        --target-org staging-org \
        --source-dir force-app \
        --wait 10

  - name: Trigger Jataka Kamikaze Pods
    run: |
      curl -X POST "https://api.shodh.ai/integrations/github/trigger" \
      -H "Authorization: Bearer ${{ secrets.JATAKA_API_KEY }}" \
      -H "Content-Type: application/json" \
      -d '{
        "repo_full_name": "${{ github.repository }}",
        "branch": "${{ github.ref_name }}",
        "pr_number": 0
      }'
```
