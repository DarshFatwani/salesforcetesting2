name: Deploy to Salesforce & Trigger Kamikaze

# Trigger on push AND pull requests
on:
  push:
    branches: [ "main", "test2", "test4", "test6", "test7" , "test8", "testing","tester","neww/KAN-4","KAN-7","KAN-8","new3" ]
    paths-ignore:
    - 'README.md'
    - '.github/**'
  pull_request:
    branches: [ "main" ] # CRITICAL: This allows it to run when you open a PR!

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
        
      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default --alias staging-org
          rm auth_url.txt
          
      # This pushes to the STAGING SANDBOX (Not Prod!)
      - name: Deploy Source
        run: sf project deploy start --target-org staging-org --source-dir force-app --wait 10 --test-level 
        
      - name: Trigger Jataka Kamikaze Pods
        run: |
          curl -X POST "${{ secrets.JATAKA_API_URL }}/integrations/github/trigger" \
            -H "Authorization: Bearer ${{ secrets.JATAKA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo_full_name": "${{ github.repository }}",
              "branch": "${{ github.head_ref || github.ref_name }}",
              "pr_number": ${{ github.event.pull_request.number || 0 }}
            }'
